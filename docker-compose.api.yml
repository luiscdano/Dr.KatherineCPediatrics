services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: dr-katherine-api
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dr_katherine
      DB_USER: postgres
      DB_PASSWORD: change_me
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: dr-katherine-db
    environment:
      POSTGRES_DB: dr_katherine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me
    volumes:
      - dr_katherine_postgres_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dr_katherine"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dr_katherine_postgres_data:
